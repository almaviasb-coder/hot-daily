        <h1>布伦森意外受伤</h1>
        <div class="body">
          <p>4日，NBA总决赛G1中，尼克斯核心杰伦&#183;布伦森在对抗中右膝遭压迫，随后脚踝再次扭伤，被迫离场接受治疗。现场画面显示，其佩戴护具返回替补席，神情凝重，目前伤情尚未公布。</p>

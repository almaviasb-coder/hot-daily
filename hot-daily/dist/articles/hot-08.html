        <h1>俄方提出停战条件</h1>
        <div class="body">
          <p>援引塔斯社6月2日报道，俄总统新闻秘书佩斯科夫表示，若泽连斯基下令乌军从俄罗斯各地区撤离，乌克兰冲突当日即可结束。俄方更倾向于和平途径，但若基辅拒绝谈判，特别军事行动将持续。此前，乌总统办公室主任称泽连斯基下令在冬季前结束战斗。</p>

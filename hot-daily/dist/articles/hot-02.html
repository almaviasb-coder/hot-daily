        <h1>顾客称张雪店员教唆偷开无牌照机车</h1>
        <div class="body">
          <p>近日，一名张雪机车车主在直播中投诉承德门店售后违规，称购车后未获车辆合格证，无法上牌和办理保险，店员还建议其夜间无牌骑行。对此，品牌负责人张雪现场决定关闭涉事门店，并为车主更换新车。</p>
        </div>

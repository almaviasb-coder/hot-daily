        <h1>《给阿嬷的情书》火了电影人集体沉默</h1>
        <div class="body">
          <p>《给阿嬷的情书》自上映以来，普通观众奔走推荐，形成了一股“久旱逢甘霖”般的观影热潮。然而，与之形成鲜明对比的是，业内的大导演、大明星却鲜少为这部电影发声。</p>

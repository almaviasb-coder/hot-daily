        <h1>今晚油价将调整</h1>
        <div class="body">
          <p>今天24时，国内成品油价格将迎来调整窗口。国内成品油价格机制规定，汽、柴油最高零售价格以国际市场原油价格为基础，每10个工作日调整一次。本轮调价周期内，国际油价走势以下降为主。</p>

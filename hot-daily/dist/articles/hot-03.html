        <h1>女子花2万查丈夫出轨揪出辅警内鬼</h1>
        <div class="body">
          <p>2025年5月，甘肃静宁县一女子花费2万元委托直播平台“私家侦探”陈某甲调查丈夫出轨，仅获900余条微信交易记录后报警。警方查明，陈某甲通过中间人左某获取贵州某公安机关辅警陈某乙非法提供的8000余条公民微信流水，3人因侵犯公民个人信息罪被判刑。</p>

        <h1>网友称11年前29.7万买的手机成摆设</h1>
        <div class="body">
          <p>6月2日，北京网友展示2015年以‌29.7万元‌购入的VERTU Signature顶配手机（另付4万元原装鳄鱼皮套），因仅支持‌2G网络‌无法适应当前通信技术，彻底沦为摆设。机主称若当年购置黄金，现价值或翻五倍。‌‌</p>
        </div>
